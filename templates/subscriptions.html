{% extends "base.html" %}
{% block title %}ProxyHub — Subscriptions{% endblock %}

{% block navbar_actions %}
<button class="btn btn-sm btn-primary" onclick="openSubModal()">+ New Subscription</button>
{% endblock %}

{% block content %}
<div id="subsList"></div>
<div class="empty-state" id="subsEmpty" style="display:none;">No subscriptions. Add one to import nodes.</div>

<!-- Subscription Modal -->
<div class="modal-overlay" id="subModal">
    <div class="modal">
        <div class="modal-title" id="subModalTitle">New Subscription</div>
        <div class="field"><label>Name</label><input class="input" id="subName"></div>
        <div class="field"><label>URL</label><input class="input" id="subUrl"></div>
        <input type="hidden" id="subEditId">
        <div class="modal-actions">
            <button class="btn" onclick="closeSubModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveSub()">Save</button>
        </div>
    </div>
</div>

<!-- Keywords Modal -->
<div class="modal-overlay" id="kwModal">
    <div class="modal">
        <div class="modal-title">Edit Keywords</div>
        <div class="field"><label>Filter (include — one per line)</label><textarea class="input" id="kwFilter" rows="4"></textarea></div>
        <div class="field"><label>Exclude (one per line)</label><textarea class="input" id="kwExclude" rows="4"></textarea></div>
        <input type="hidden" id="kwSubId">
        <div class="modal-actions">
            <button class="btn" onclick="closeKwModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveKw()">Save</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal"><div class="modal-title">Confirm Delete</div><p id="deleteMessage"></p><div class="modal-actions"><button class="btn" onclick="closeDeleteModal()">Cancel</button><button class="btn btn-danger" id="deleteConfirmBtn">Delete</button></div></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var subs = [];

function closeSubModal() { document.getElementById('subModal').classList.remove('show'); }
function closeKwModal() { document.getElementById('kwModal').classList.remove('show'); }
function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('show'); }

function formatBytes(b) {
    if (!b || b <= 0) return '0 B';
    if (b < 1024) return b + ' B';
    var kb = b / 1024; if (kb < 1024) return kb.toFixed(1) + ' KB';
    var mb = kb / 1024; if (mb < 1024) return mb.toFixed(1) + ' MB';
    var gb = mb / 1024; if (gb < 1024) return gb.toFixed(1) + ' GB';
    return (gb / 1024).toFixed(1) + ' TB';
}

function daysUntil(ts) {
    if (!ts || ts <= 0) return null;
    var now = Date.now() / 1000;
    return Math.ceil((ts - now) / 86400);
}

async function loadData() {
    try {
        var resp = await fetch('/api/subscriptions');
        subs = await resp.json();
        renderSubs();
    } catch(e) {}
}

function renderSubs() {
    var list = document.getElementById('subsList');
    if (!subs.length) { list.innerHTML = ''; document.getElementById('subsEmpty').style.display = 'block'; return; }
    document.getElementById('subsEmpty').style.display = 'none';
    list.innerHTML = subs.map(function(s) {
        var updated = s.updated_at ? s.updated_at.replace('T',' ').slice(0,19) : 'Never';
        var traffic = '';
        if (s.total_bytes > 0) {
            var used = (s.upload_bytes || 0) + (s.download_bytes || 0);
            var rem = s.total_bytes - used;
            traffic = '<div style="font-size:12px;color:#888;">Traffic: ' + formatBytes(used) + ' / ' + formatBytes(s.total_bytes) + ' — ' + formatBytes(Math.max(0,rem)) + ' remaining</div>';
        }
        var expiry = '';
        if (s.expire_at && s.expire_at > 0) {
            var days = daysUntil(s.expire_at);
            expiry = '<div style="font-size:12px;color:#888;">Expires: ' + new Date(s.expire_at * 1000).toISOString().slice(0,10) + (days !== null ? ' (' + days + ' days)' : '') + '</div>';
        }
        return '<div class="section"><div class="section-body"><div style="display:flex;justify-content:space-between;align-items:center;"><span><strong>' + escapeHtml(s.name) + '</strong> &middot; <span style="color:#888;">' + (s.node_count||0) + ' nodes</span> <span style="font-size:11px;color:#bbb;">[updated: ' + updated + ']</span></span><span style="display:flex;gap:4px;"><button class="btn btn-sm btn-ok" onclick="refreshSub(' + s.id + ')">&#8635; Refresh</button><button class="btn btn-sm" onclick="openSubModal(' + s.id + ')">&#9998;</button><button class="btn btn-sm btn-danger" onclick="confirmDelete(' + s.id + ')">&#10005;</button></span></div>' + traffic + expiry + '<div style="margin-top:6px;display:flex;gap:12px;"><span style="font-size:12px;cursor:pointer;color:#1976d2;" onclick="openKw(' + s.id + ', \'' + (s.filter_keywords||'').replace(/'/g,"\\'") + '\', \'' + (s.exclude_keywords||'').replace(/'/g,"\\'") + '\')">filter: ' + (s.filter_keywords || '(none)') + '</span><span style="font-size:12px;cursor:pointer;color:#1976d2;" onclick="openKw(' + s.id + ', \'' + (s.filter_keywords||'').replace(/'/g,"\\'") + '\', \'' + (s.exclude_keywords||'').replace(/'/g,"\\'") + '\')">exclude: ' + (s.exclude_keywords || '(none)') + '</span></div></div></div>';
    }).join('');
}

function openSubModal(editId) {
    document.getElementById('subEditId').value = editId || '';
    document.getElementById('subModalTitle').textContent = editId ? 'Edit Subscription' : 'New Subscription';
    document.getElementById('subName').value = '';
    document.getElementById('subUrl').value = '';
    if (editId) {
        var s = subs.find(function(x) { return x.id == editId; });
        if (s) { document.getElementById('subName').value = s.name; document.getElementById('subUrl').value = s.url; }
    }
    document.getElementById('subModal').classList.add('show');
}

async function saveSub() {
    var editId = document.getElementById('subEditId').value;
    var payload = { name: document.getElementById('subName').value, url: document.getElementById('subUrl').value };
    var url = '/api/subscriptions' + (editId ? '/' + editId : '');
    var method = editId ? 'PUT' : 'POST';
    try {
        var resp = await fetch(url, { method: method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        var data = await resp.json();
        closeSubModal();
        addLog(data.success ? 'ok' : 'error', data.message || '');
        loadData();
    } catch(e) { addLog('error', 'Save failed: ' + e); }
}

function openKw(id, filter, exclude) {
    document.getElementById('kwSubId').value = id;
    document.getElementById('kwFilter').value = filter;
    document.getElementById('kwExclude').value = exclude;
    document.getElementById('kwModal').classList.add('show');
}

async function saveKw() {
    var id = document.getElementById('kwSubId').value;
    var payload = { filter_keywords: document.getElementById('kwFilter').value, exclude_keywords: document.getElementById('kwExclude').value };
    try {
        var resp = await fetch('/api/subscriptions/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        await resp.json();
        closeKwModal();
        addLog('ok', 'Keywords updated. Refresh subscription to apply filters.');
        loadData();
    } catch(e) {}
}

async function refreshSub(id) {
    try {
        addLog('info', 'Refreshing subscription...');
        var resp = await fetch('/api/subscriptions/' + id + '/refresh', { method: 'POST' });
        var data = await resp.json();
        addLog(data.success ? 'ok' : 'error', data.message || '');
        loadData();
    } catch(e) { addLog('error', 'Refresh failed: ' + e); }
}

function confirmDelete(id) {
    document.getElementById('deleteMessage').textContent = 'Delete subscription #' + id + ' and all its nodes?';
    document.getElementById('deleteConfirmBtn').onclick = async function() {
        try {
            await fetch('/api/subscriptions/' + id, { method: 'DELETE' });
            closeDeleteModal();
            loadData();
            addLog('ok', 'Subscription deleted');
        } catch(e) {}
    };
    document.getElementById('deleteModal').classList.add('show');
}

loadData();
</script>
{% endblock %}
